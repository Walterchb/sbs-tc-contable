name: Fetch yfinance market data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC por defecto.
    # Perú = UTC-5.
    # Esto corre de lunes a viernes, cada hora, entre 7:17 y 18:17 hora Perú aprox.
    - cron: "17 12-23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: fetch-yfinance-market-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Fetch market data
        run: python scripts/fetch_yfinance_market.py

      - name: Show generated files
        run: |
          echo "Generated files:"
          ls -lah data/yfinance || true
          echo ""
          echo "Preview latest.json:"
          head -40 data/yfinance/latest.json || true

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain data/yfinance)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/yfinance/latest.json data/yfinance/history.csv
            git commit -m "Update yfinance market data"
            git push
          else
            echo "No yfinance data changes to commit."
          fi
