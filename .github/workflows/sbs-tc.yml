name: SBS TC Contable Update

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: sbs-tc-contable
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scrape SBS and build data files (curl fallback + no-fail)
        shell: bash
        run: |
          python - <<'PY'
          import re, json, hashlib, time, subprocess, shlex, urllib.parse
          from pathlib import Path
          from datetime import datetime, timezone

          URL = "https://www.sbs.gob.pe/app/pp/SISTIP_PORTAL/Paginas/Publicacion/TipoCambioContable.aspx"
          DATA = Path("data")
          DATA.mkdir(parents=True, exist_ok=True)

          def norm(s=""):
              return re.sub(r"\s+", " ", str(s)).strip()

          def norm_key(s=""):
              s = norm(s).lower()
              tr = str.maketrans("áéíóúüñ", "aeiouun")
              return s.translate(tr)

          def run_curl(url, timeout=55):
              # curl suele comportarse mejor que urllib aquí (redirecciones/WAF)
              cmd = [
                  "curl", "-sSL", "--max-time", str(timeout),
                  "--retry", "2", "--retry-delay", "3", "--retry-all-errors",
                  "-A", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122 Safari/537.36",
                  "-H", "Accept-Language: es-PE,es;q=0.9,en;q=0.8",
                  "-H", "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  "-e", "https://www.sbs.gob.pe/",
                  "--compressed",
                  url
              ]
              p = subprocess.run(cmd, capture_output=True, text=True)
              if p.returncode != 0:
                  raise RuntimeError(f"curl rc={p.returncode}: {p.stderr.strip()[:220]}")
              txt = p.stdout or ""
              if len(txt) < 200:
                  raise RuntimeError("respuesta vacía/corta")
              return txt

          def fetch_any():
              sources = [
                  ("directo", URL),
                  ("r.jina.ai", "https://r.jina.ai/http://" + URL.replace("https://", "")),
                  ("allorigins", "https://api.allorigins.win/raw?url=" + urllib.parse.quote(URL, safe="")),
              ]
              errors = []
              for name, u in sources:
                  try:
                      txt = run_curl(u)
                      # heurística anti-bloqueo
                      bad = ["403 Forbidden", "Access Denied", "captcha", "Cloudflare", "Request blocked"]
                      if any(b.lower() in txt.lower() for b in bad):
                          raise RuntimeError("contenido bloqueado")
                      print(f"[source ok] {name} | len={len(txt)}")
                      return txt, name
                  except Exception as e:
                      msg = f"{name}: {e}"
                      errors.append(msg)
                      print(f"[source fail] {msg}")
              raise RuntimeError(" | ".join(errors))

          def extract_date(raw):
              # patrón principal
              m = re.search(r"Tipo\s+de\s+Cambio\s+al\s+(\d{2}/\d{2}/\d{4})", raw, flags=re.I)
              if m:
                  return m.group(1)

              # patrón flexible alrededor de 'tipo de cambio'
              m2 = re.search(r"Tipo\s*de\s*Cambio.{0,80}?(\d{2}/\d{2}/\d{4})", raw, flags=re.I | re.S)
              if m2:
                  return m2.group(1)

              # fallback: hoy UTC
              return datetime.now(timezone.utc).strftime("%d/%m/%Y")

          def to_text(raw):
              # si viene HTML, quitamos tags; si viene texto proxy, igual funciona
              txt = raw
              txt = re.sub(r"<script[\s\S]*?</script>", " ", txt, flags=re.I)
              txt = re.sub(r"<style[\s\S]*?</style>", " ", txt, flags=re.I)
              txt = re.sub(r"<br\s*/?>", "\n", txt, flags=re.I)
              txt = re.sub(r"</(p|div|tr|li|h\d|td|th)>", "\n", txt, flags=re.I)
              txt = re.sub(r"<[^>]+>", " ", txt)
              # entidades html mínimas
              txt = txt.replace("&nbsp;", " ").replace("&amp;", "&").replace("&quot;", '"').replace("&#39;", "'")
              return txt

          def valid_tc(v):
              try:
                  x = float(v)
                  return 0 < x < 20
              except:
                  return False

          def clean_desc(d):
              d = norm(d)
              d = re.sub(r"^PAISMONEDATIPO DE CAMBIO\s*\(EN S/\)\s*", "", d, flags=re.I)
              d = re.sub(r"^PAIS\s+MONEDA\s+TIPO DE CAMBIO\s*\(EN S/\)\s*", "", d, flags=re.I)
              d = re.sub(r"^TIPO DE CAMBIO AL \d{2}/\d{2}/\d{4}\s*", "", d, flags=re.I)
              return d.strip()

          def split_pais_moneda(desc):
              d = norm(desc)
              cues = [
                  "Dólar","Euro","Peso","Yuan","Won","Colón","Dirham","Rublo","Lari","Quetzal",
                  "Rupia","Yen","Ringgit","Corona","Balboa","Guaraní","Zloty","Libra","Franco",
                  "Baht","Lira","Dong","Boliviano","Lev","Real","Naira","Nuevo Dólar"
              ]
              idx = -1
              for cue in cues:
                  i = d.find(cue)
                  if i > 0 and (idx == -1 or i < idx):
                      idx = i
              if idx > 0:
                  return norm(d[:idx]), norm(d[idx:])
              parts = [p for p in d.split(" ") if p]
              if len(parts) >= 3:
                  return " ".join(parts[:-2]), " ".join(parts[-2:])
              return d, ""

          def parse_rows(raw_text):
              text = to_text(raw_text)
              lines = [norm(x) for x in re.split(r"\r?\n+", text) if norm(x)]
              rows = []

              for ln in lines:
                  up = ln.upper()
                  if "PAISMONEDATIPO DE CAMBIO" in up:
                      continue
                  if "TIPO DE CAMBIO (EN S/)" in up:
                      continue
                  if "COLUMNS" in up or "INGRESE FECHA" in up:
                      continue

                  mm = re.search(r"(.+?)(-?\d+(?:[.,]\d{3,8}))$", ln)
                  if not mm:
                      continue

                  desc = clean_desc(mm.group(1))
                  tc_s = mm.group(2).replace(",", ".")
                  if not valid_tc(tc_s) or len(desc) < 4:
                      continue

                  pais, moneda = split_pais_moneda(desc)
                  rows.append({"pais": pais, "moneda": moneda, "tc": float(tc_s)})

              # fallback compacto
              if len(rows) < 10:
                  compact = norm(text)
                  start = compact.upper().find("TIPO DE CAMBIO")
                  chunk = compact[start if start >= 0 else 0:]
                  rows2 = []
                  for mm in re.finditer(r"([A-Za-zÁÉÍÓÚÜÑáéíóúüñ().,\-/ ]{4,}?)(-?\d+(?:[.,]\d{3,8}))", chunk):
                      desc = clean_desc(mm.group(1))
                      tc_s = mm.group(2).replace(",", ".")
                      if not valid_tc(tc_s) or len(desc) < 4:
                          continue
                      pais, moneda = split_pais_moneda(desc)
                      rows2.append({"pais": pais, "moneda": moneda, "tc": float(tc_s)})
                  rows = rows2

              # dedup
              seen, out = set(), []
              for r in rows:
                  k = f'{r["pais"]}|{r["moneda"]}|{r["tc"]}'
                  if k in seen:
                      continue
                  seen.add(k)
                  out.append(r)
              return out

          def csv_escape(v):
              s = "" if v is None else str(v)
              if any(c in s for c in [",", '"', "\n"]):
                  s = '"' + s.replace('"', '""') + '"'
              return s

          def write_status(ok, message, source=None):
              status = {
                  "ok": ok,
                  "message": message,
                  "source": source,
                  "generated_utc": datetime.now(timezone.utc).isoformat()
              }
              (DATA / "last_run_status.json").write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")

          def currency_code(row):
              """Identifica códigos principales para construir cruces contra USD.
              USD se toma estrictamente como Dólar de N.A. para evitar confundirlo con otros dólares.
              """
              pais = norm_key(row.get("pais", ""))
              moneda = norm_key(row.get("moneda", ""))
              txt = f"{pais} {moneda}"

              # USD estricto: SBS publica la moneda como Dólar de N.A.
              if "dolar de n.a" in moneda or "dolar n.a" in moneda or "dolar de na" in moneda:
                  return "USD"

              # Principales usados por la web.
              if moneda == "euro" or " euro" in f" {moneda} ":
                  return "EUR"
              if "libra esterlina" in moneda or ("libra" in moneda and ("reino unido" in pais or "gran bretana" in pais)):
                  return "GBP"
              if "yuan" in moneda or "renminbi" in moneda:
                  return "CNH"
              if "yen" in moneda and "japon" in pais:
                  return "JPY"

              # Otros códigos útiles para que el histórico quede más completo.
              rules = [
                  ("AUD", ["australia"], ["dolar"]),
                  ("CAD", ["canada"], ["dolar"]),
                  ("CHF", ["suiza"], ["franco"]),
                  ("CLP", ["chile"], ["peso"]),
                  ("COP", ["colombia"], ["peso"]),
                  ("MXN", ["mexico"], ["peso"]),
                  ("BRL", ["brasil"], ["real"]),
                  ("ARS", ["argentina"], ["peso"]),
                  ("BOB", ["bolivia"], ["boliviano"]),
                  ("PYG", ["paraguay"], ["guarani"]),
                  ("UYU", ["uruguay"], ["peso"]),
                  ("KRW", ["corea"], ["won"]),
                  ("SGD", ["singapur"], ["dolar"]),
                  ("HKD", ["hong kong"], ["dolar"]),
                  ("NZD", ["nueva zeland", "nueva zelanda"], ["dolar"]),
                  ("NOK", ["noruega"], ["corona"]),
                  ("SEK", ["suecia"], ["corona"]),
                  ("DKK", ["dinamarca"], ["corona"]),
                  ("TRY", ["turquia"], ["lira"]),
                  ("ZAR", ["sudafrica", "sudáfrica"], ["rand"]),
                  ("INR", ["india"], ["rupia"]),
                  ("THB", ["tailandia"], ["baht"]),
              ]
              for code, pais_needles, moneda_needles in rules:
                  if any(x in pais for x in pais_needles) and any(x in moneda for x in moneda_needles):
                      return code
              return None

          def as_number(x):
              try:
                  return float(x)
              except Exception:
                  return None

          def read_daily_json(path):
              obj = json.loads(path.read_text(encoding="utf-8"))
              rows = obj.get("data") or obj.get("rows") or []
              if not isinstance(rows, list):
                  return None
              fecha_iso = obj.get("fecha_iso")
              if not fecha_iso:
                  m = re.search(r"tc_contable_(\d{4}-\d{2}-\d{2})\.json$", path.name)
                  fecha_iso = m.group(1) if m else None
              if not fecha_iso:
                  return None
              fecha_publicada = obj.get("fecha_publicada") or datetime.strptime(fecha_iso, "%Y-%m-%d").strftime("%d/%m/%Y")
              return {
                  "fecha_iso": fecha_iso,
                  "fecha_publicada": fecha_publicada,
                  "generated_utc": obj.get("generado_utc"),
                  "source_used": obj.get("source_used"),
                  "rows": rows,
                  "file": path.name,
              }

          def build_history_files():
              """Construye un histórico consolidado desde los JSON diarios ya guardados.
              No scrapea fechas antiguas y no falla el workflow si algo sale mal.
              """
              daily_paths = sorted(DATA.glob("tc_contable_????-??-??.json"))
              by_date = {}
              skipped = []

              for path in daily_paths:
                  try:
                      item = read_daily_json(path)
                      if not item:
                          skipped.append({"file": path.name, "reason": "sin fecha/data válida"})
                          continue
                      by_date[item["fecha_iso"]] = item
                  except Exception as e:
                      skipped.append({"file": path.name, "reason": str(e)[:180]})

              series = []
              observations = []
              meta_dates = []
              all_pairs = set()

              for fecha_iso in sorted(by_date):
                  item = by_date[fecha_iso]
                  rows = item["rows"]

                  usd_row = None
                  coded = []
                  for r in rows:
                      code = currency_code(r)
                      tc_pen = as_number(r.get("tc"))
                      if not code or tc_pen is None:
                          continue
                      rec = {
                          "code": code,
                          "pais": norm(r.get("pais", "")),
                          "moneda": norm(r.get("moneda", "")),
                          "tc_pen": tc_pen,
                      }
                      coded.append(rec)
                      if code == "USD":
                          usd_row = rec

                  if not usd_row:
                      skipped.append({"file": item["file"], "reason": "no se encontró USD como Dólar de N.A."})
                      continue

                  usd_pen = usd_row["tc_pen"]
                  point = {
                      "fecha_iso": fecha_iso,
                      "fecha_publicada": item["fecha_publicada"],
                      "USDPEN": usd_pen,
                  }
                  all_pairs.add("USDPEN")

                  for rec in coded:
                      if rec["code"] == "USD":
                          pair = "USDPEN"
                          tc_value = usd_pen
                      else:
                          pair = f'{rec["code"]}USD'
                          tc_value = rec["tc_pen"] / usd_pen

                      # Si hay duplicados de código en SBS, conserva el primero para la serie ancha.
                      if pair not in point:
                          point[pair] = tc_value
                          all_pairs.add(pair)

                      observations.append({
                          "fecha_iso": fecha_iso,
                          "fecha_publicada": item["fecha_publicada"],
                          "code": rec["code"],
                          "pair": pair,
                          "pais": rec["pais"],
                          "moneda": rec["moneda"],
                          "tc_pen": rec["tc_pen"],
                          "tc_usd": tc_value,
                      })

                  series.append(point)
                  meta_dates.append({
                      "fecha_iso": fecha_iso,
                      "fecha_publicada": item["fecha_publicada"],
                      "file": item["file"],
                      "rows": len(rows),
                      "source_used": item.get("source_used"),
                  })

              preferred = ["USDPEN", "EURUSD", "GBPUSD", "CNHUSD", "JPYUSD"]
              pairs = preferred + sorted(p for p in all_pairs if p not in preferred)
              range_obj = {
                  "from": series[0]["fecha_iso"] if series else None,
                  "to": series[-1]["fecha_iso"] if series else None,
              }

              history = {
                  "schema": "tc_contable_history.v1",
                  "generated_utc": datetime.now(timezone.utc).isoformat(),
                  "source": "data/tc_contable_YYYY-MM-DD.json",
                  "count_dates": len(series),
                  "range": range_obj,
                  "pairs": pairs,
                  "series": series,
                  "observations": observations,
                  "dates": meta_dates,
                  "skipped": skipped,
              }

              (DATA / "tc_contable_history.json").write_text(json.dumps(history, ensure_ascii=False, indent=2), encoding="utf-8")

              # CSV ancho: una fila por fecha y un campo por par.
              csv_cols = ["fecha_iso", "fecha_publicada"] + pairs
              csv_lines = [",".join(csv_cols)]
              for p in series:
                  csv_lines.append(",".join(csv_escape(p.get(c, "")) for c in csv_cols))
              (DATA / "tc_contable_history.csv").write_text("\ufeff" + "\n".join(csv_lines), encoding="utf-8")

              # Manifest liviano para front-end/debug.
              manifest = {
                  "generated_utc": history["generated_utc"],
                  "history_file": "tc_contable_history.json",
                  "history_csv": "tc_contable_history.csv",
                  "count_dates": len(series),
                  "range": range_obj,
                  "pairs": pairs,
                  "daily_files": [x["file"] for x in meta_dates],
              }
              (DATA / "tc_contable_manifest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding="utf-8")

              print(f"History OK | fechas={len(series)} | pares={len(pairs)} | observaciones={len(observations)}")

          # seed mínimo para evitar primer-run rojo sin archivos
          if not (DATA / "tc_contable_meta.json").exists():
              seed = {
                  "fuente": URL,
                  "fecha_publicada": None,
                  "fecha_iso": None,
                  "generado_utc": None,
                  "rows": 0,
                  "hash": None
              }
              (DATA / "tc_contable_meta.json").write_text(json.dumps(seed, ensure_ascii=False, indent=2), encoding="utf-8")
              (DATA / "tc_contable_latest.csv").write_text("pais,moneda,tc\n", encoding="utf-8")
              (DATA / "tc_contable_latest.json").write_text(json.dumps({"message":"pending successful run"}, ensure_ascii=False, indent=2), encoding="utf-8")
              (DATA / "tc_contable_history.json").write_text(json.dumps({
                  "schema": "tc_contable_history.v1",
                  "generated_utc": datetime.now(timezone.utc).isoformat(),
                  "count_dates": 0,
                  "range": {"from": None, "to": None},
                  "pairs": [],
                  "series": [],
                  "observations": [],
                  "dates": [],
                  "skipped": []
              }, ensure_ascii=False, indent=2), encoding="utf-8")
              (DATA / "tc_contable_history.csv").write_text("\ufefffecha_iso,fecha_publicada\n", encoding="utf-8")

          try:
              raw, source = fetch_any()
              fecha = extract_date(raw)
              d, m, y = fecha.split("/")
              fecha_iso = f"{y}-{m}-{d}"

              rows = parse_rows(raw)
              if len(rows) == 0:
                  raise RuntimeError("No se parsearon filas de TC")

              rows.sort(key=lambda z: (z["pais"] + z["moneda"]).lower())

              payload = {"fecha_publicada": fecha, "rows": rows}
              hashv = hashlib.sha256(json.dumps(payload, ensure_ascii=False, separators=(",", ":")).encode("utf-8")).hexdigest()
              generado_utc = datetime.now(timezone.utc).isoformat()

              meta = {
                  "fuente": URL,
                  "source_used": source,
                  "fecha_publicada": fecha,
                  "fecha_iso": fecha_iso,
                  "generado_utc": generado_utc,
                  "rows": len(rows),
                  "hash": hashv
              }
              latest_json = {**meta, "data": rows}

              csv_lines = ["pais,moneda,tc"]
              for r in rows:
                  csv_lines.append(",".join([csv_escape(r["pais"]), csv_escape(r["moneda"]), csv_escape(r["tc"])]))
              csv_txt = "\ufeff" + "\n".join(csv_lines)

              (DATA / "tc_contable_latest.csv").write_text(csv_txt, encoding="utf-8")
              (DATA / "tc_contable_latest.json").write_text(json.dumps(latest_json, ensure_ascii=False, indent=2), encoding="utf-8")
              (DATA / "tc_contable_meta.json").write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding="utf-8")
              (DATA / f"tc_contable_{fecha_iso}.csv").write_text(csv_txt, encoding="utf-8")
              (DATA / f"tc_contable_{fecha_iso}.json").write_text(json.dumps(latest_json, ensure_ascii=False, indent=2), encoding="utf-8")

              msg = f"OK | source={source} | fecha={fecha} | filas={len(rows)}"
              print(msg)
              write_status(True, msg, source=source)

          except Exception as e:
              # no rompemos workflow: se conserva la data previa
              err = f"WARNING: No se pudo actualizar hoy. Se conserva data previa. Detalle: {e}"
              print(err)
              (DATA / "last_error.txt").write_text(err, encoding="utf-8")
              write_status(False, err, source=None)

          try:
              build_history_files()
          except Exception as e:
              # El histórico no debe tumbar el workflow ni borrar latest/daily.
              err = f"WARNING: No se pudo construir tc_contable_history.json. Detalle: {e}"
              print(err)
              (DATA / "last_history_error.txt").write_text(err, encoding="utf-8")

          # Siempre exit 0 para evitar rojo por bloqueos temporales del origen
          raise SystemExit(0)
          PY

      - name: Commit if changed
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "Sin cambios en data/"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "update: SBS TC $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
