<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Página no encontrada</title>

  <!-- Usa tu CSS global si ya existe -->
  <link rel="stylesheet" href="/styles.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font, Manrope, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      color: var(--text, #101828);
      background: var(--bg, #f6f8fb);
      overflow-x: hidden;
    }

    .not-found-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: clamp(24px, 6vw, 72px);
      isolation: isolate;
    }

    .not-found-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(var(--grid-line, rgba(16, 24, 40, 0.07)) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line, rgba(16, 24, 40, 0.07)) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at 45% 50%, black 0%, black 42%, transparent 82%);
    }

    .not-found-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 20%, color-mix(in srgb, var(--accent, #1d6f8f) 18%, transparent), transparent 28%),
        radial-gradient(circle at 85% 75%, color-mix(in srgb, var(--primary, #051c2c) 12%, transparent), transparent 30%),
        linear-gradient(to bottom, transparent 0%, var(--bg, #f6f8fb) 95%);
      pointer-events: none;
    }

    .ghost-number {
      position: absolute;
      right: clamp(-42px, 4vw, 56px);
      top: 50%;
      transform: translateY(-50%);
      z-index: -1;
      font-size: clamp(180px, 34vw, 520px);
      line-height: 0.8;
      font-weight: 950;
      letter-spacing: -0.14em;
      color: color-mix(in srgb, var(--primary, #051c2c) 7%, transparent);
      user-select: none;
      pointer-events: none;
    }

    .content {
      width: min(760px, 100%);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(52px, 8vw, 96px);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--primary, #051c2c);
      color: var(--on-primary, #ffffff);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 14px 34px color-mix(in srgb, var(--primary, #051c2c) 22%, transparent);
    }

    .brand-name {
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -0.03em;
      color: var(--text, #101828);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--muted, #667085);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 36px;
      height: 1px;
      background: var(--accent, #1d6f8f);
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(46px, 8vw, 94px);
      line-height: 0.92;
      letter-spacing: -0.08em;
      color: var(--text, #101828);
    }

    .lead {
      max-width: 560px;
      margin: 24px 0 0;
      color: var(--muted, #667085);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.75;
    }

    .divider {
      width: min(560px, 100%);
      height: 1px;
      margin: 36px 0;
      background: linear-gradient(
        90deg,
        var(--border, rgba(16, 24, 40, 0.12)),
        transparent
      );
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: var(--radius-md, 16px);
      font-weight: 850;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--primary, #051c2c);
      color: var(--on-primary, #ffffff);
      box-shadow: 0 16px 38px color-mix(in srgb, var(--primary, #051c2c) 24%, transparent);
    }

    .btn-secondary {
      color: var(--text, #101828);
      border: 1px solid var(--border, rgba(16, 24, 40, 0.12));
      background: color-mix(in srgb, var(--surface, #ffffff) 72%, transparent);
      backdrop-filter: blur(14px);
    }

    .route {
      margin-top: 34px;
      display: inline-flex;
      max-width: min(560px, 100%);
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--border, rgba(16, 24, 40, 0.10));
      background: color-mix(in srgb, var(--surface, #ffffff) 64%, transparent);
      color: var(--muted, #667085);
      font-size: 13px;
      backdrop-filter: blur(14px);
    }

    .route span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: var(--bg, #07111c);
        color: var(--text, #f8fafc);
      }

      .not-found-page::before {
        background:
          linear-gradient(var(--grid-line, rgba(255, 255, 255, 0.07)) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line, rgba(255, 255, 255, 0.07)) 1px, transparent 1px);
        background-size: 36px 36px;
      }

      .ghost-number {
        color: color-mix(in srgb, var(--text, #f8fafc) 8%, transparent);
      }
    }

    @media (max-width: 680px) {
      .not-found-page {
        align-items: flex-start;
        padding: 28px 20px;
      }

      .brand-row {
        margin-bottom: 72px;
      }

      .ghost-number {
        top: auto;
        bottom: 18px;
        right: -24px;
        transform: none;
        font-size: clamp(170px, 54vw, 280px);
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="not-found-page">
    <div class="ghost-number">404</div>

    <section class="content">
      <div class="brand-row">
        <div class="brand-mark">TH</div>
        <div class="brand-name">TreasuryHub</div>
      </div>

      <div class="eyebrow">Página no encontrada</div>

      <h1>Esta página ya no está en el mapa.</h1>

      <p class="lead">
        El enlace puede haber cambiado, la página pudo eliminarse o la ruta todavía no está publicada.
        Puedes volver al inicio y continuar navegando.
      </p>

      <div class="divider"></div>

      <div class="actions">
        <a class="btn btn-primary" href="/">Volver al inicio</a>
        <a class="btn btn-secondary" href="javascript:history.back()">Regresar</a>
      </div>

      <div class="route">
        <span id="current-route">Ruta no disponible</span>
      </div>
    </section>
  </main>

  <script>
    const currentRoute = document.getElementById("current-route");

    if (currentRoute) {
      currentRoute.textContent = window.location.pathname;
    }
  </script>
</body>
</html>
