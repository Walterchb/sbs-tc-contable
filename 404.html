<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Página no encontrada</title>

  <!-- Mantén tu CSS global si existe -->
  <link rel="stylesheet" href="/styles.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      --nf-bg: var(--bg, #f6f8fb);
      --nf-text: var(--text, #101828);
      --nf-muted: var(--muted, #667085);
      --nf-primary: var(--primary, #051c2c);
      --nf-accent: var(--accent, #1d6f8f);
      --nf-border: var(--border, rgba(16, 24, 40, 0.12));
      --nf-surface: var(--surface, rgba(255, 255, 255, 0.68));
      --nf-grid: var(--grid-line, rgba(16, 24, 40, 0.075));
      --nf-shadow: var(--shadow-lg, 0 18px 46px rgba(16, 24, 40, 0.14));
      --nf-on-primary: var(--on-primary, #ffffff);

      margin: 0;
      min-height: 100vh;
      font-family: var(--font, Manrope, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      color: var(--nf-text);
      background: var(--nf-bg);
      overflow-x: hidden;
    }

    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) body:not([data-theme="light"]) {
        --nf-bg: var(--bg, #07111c);
        --nf-text: var(--text, #f8fafc);
        --nf-muted: var(--muted, #98a2b3);
        --nf-primary: var(--primary, #f8fafc);
        --nf-accent: var(--accent, #69c7e8);
        --nf-border: var(--border, rgba(255, 255, 255, 0.12));
        --nf-surface: var(--surface, rgba(9, 20, 32, 0.62));
        --nf-grid: var(--grid-line, rgba(255, 255, 255, 0.075));
        --nf-shadow: var(--shadow-lg, 0 24px 70px rgba(0, 0, 0, 0.36));
        --nf-on-primary: var(--on-primary, #07111c);
      }
    }

    html[data-theme="dark"] body,
    body[data-theme="dark"],
    html.dark body,
    body.dark {
      --nf-bg: var(--bg-dark, var(--bg, #07111c));
      --nf-text: var(--text-dark, var(--text, #f8fafc));
      --nf-muted: var(--muted-dark, var(--muted, #98a2b3));
      --nf-primary: var(--primary-dark, var(--primary, #f8fafc));
      --nf-accent: var(--accent-dark, var(--accent, #69c7e8));
      --nf-border: var(--border-dark, rgba(255, 255, 255, 0.12));
      --nf-surface: var(--surface-dark, rgba(9, 20, 32, 0.62));
      --nf-grid: var(--grid-line-dark, rgba(255, 255, 255, 0.075));
      --nf-shadow: var(--shadow-lg, 0 24px 70px rgba(0, 0, 0, 0.36));
      --nf-on-primary: var(--on-primary-dark, #07111c);
    }

    html[data-theme="light"] body,
    body[data-theme="light"],
    html.light body,
    body.light {
      --nf-bg: var(--bg-light, var(--bg, #f6f8fb));
      --nf-text: var(--text-light, var(--text, #101828));
      --nf-muted: var(--muted-light, var(--muted, #667085));
      --nf-primary: var(--primary-light, var(--primary, #051c2c));
      --nf-accent: var(--accent-light, var(--accent, #1d6f8f));
      --nf-border: var(--border-light, rgba(16, 24, 40, 0.12));
      --nf-surface: var(--surface-light, rgba(255, 255, 255, 0.68));
      --nf-grid: var(--grid-line-light, rgba(16, 24, 40, 0.075));
      --nf-shadow: var(--shadow-lg, 0 18px 46px rgba(16, 24, 40, 0.14));
      --nf-on-primary: var(--on-primary-light, #ffffff);
    }

    .not-found-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: clamp(24px, 6vw, 72px);
      isolation: isolate;
      overflow: hidden;
      background: var(--nf-bg);
    }

    .not-found-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        linear-gradient(var(--nf-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--nf-grid) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at 45% 50%, black 0%, black 42%, transparent 82%);
    }

    .not-found-page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 20%, color-mix(in srgb, var(--nf-accent) 18%, transparent), transparent 28%),
        radial-gradient(circle at 85% 75%, color-mix(in srgb, var(--nf-primary) 11%, transparent), transparent 30%),
        linear-gradient(to bottom, transparent 0%, var(--nf-bg) 95%);
      pointer-events: none;
    }

    .ghost-number {
      position: absolute;
      right: clamp(-42px, 4vw, 56px);
      top: 50%;
      transform: translateY(-50%);
      z-index: -1;
      font-size: clamp(180px, 34vw, 520px);
      line-height: 0.8;
      font-weight: 950;
      letter-spacing: -0.14em;
      color: color-mix(in srgb, var(--nf-primary) 7%, transparent);
      user-select: none;
      pointer-events: none;
    }

    .content {
      width: min(760px, 100%);
      position: relative;
      z-index: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(52px, 8vw, 96px);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm, 14px);
      display: grid;
      place-items: center;
      background: var(--nf-primary);
      color: var(--nf-on-primary);
      font-size: 13px;
      font-weight: 900;
      box-shadow: var(--nf-shadow);
    }

    .brand-name {
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -0.03em;
      color: var(--nf-text);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--nf-muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 36px;
      height: 1px;
      background: var(--nf-accent);
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(46px, 8vw, 94px);
      line-height: 0.92;
      letter-spacing: -0.08em;
      color: var(--nf-text);
    }

    .lead {
      max-width: 560px;
      margin: 24px 0 0;
      color: var(--nf-muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.75;
    }

    .divider {
      width: min(560px, 100%);
      height: 1px;
      margin: 36px 0;
      background: linear-gradient(90deg, var(--nf-border), transparent);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: var(--radius-md, 16px);
      font-weight: 850;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--nf-primary);
      color: var(--nf-on-primary);
      box-shadow: var(--nf-shadow);
    }

    .btn-secondary {
      color: var(--nf-text);
      border: 1px solid var(--nf-border);
      background: var(--nf-surface);
      backdrop-filter: blur(14px);
    }

    .route {
      margin-top: 34px;
      display: inline-flex;
      max-width: min(560px, 100%);
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--nf-border);
      background: var(--nf-surface);
      color: var(--nf-muted);
      font-size: 13px;
      backdrop-filter: blur(14px);
    }

    .route span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (max-width: 680px) {
      .not-found-page {
        align-items: flex-start;
        padding: 28px 20px;
      }

      .brand-row {
        margin-bottom: 72px;
      }

      .ghost-number {
        top: auto;
        bottom: 18px;
        right: -24px;
        transform: none;
        font-size: clamp(170px, 54vw, 280px);
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="not-found-page">
    <div class="ghost-number">404</div>

    <section class="content">
      <div class="brand-row">
        <div class="brand-mark">TH</div>
        <div class="brand-name">TreasuryHub</div>
      </div>

      <div class="eyebrow">Página no encontrada</div>

      <h1>Esta página ya no está en el mapa.</h1>

      <p class="lead">
        El enlace puede haber cambiado, la página pudo eliminarse o la ruta todavía no está publicada.
        Puedes volver al inicio y continuar navegando.
      </p>

      <div class="divider"></div>

      <div class="actions">
        <a class="btn btn-primary" href="/">Volver al inicio</a>
        <a class="btn btn-secondary" href="javascript:history.back()">Regresar</a>
      </div>

      <div class="route">
        <span id="current-route">Ruta no disponible</span>
      </div>
    </section>
  </main>

  <script>
    const currentRoute = document.getElementById("current-route");

    if (currentRoute) {
      currentRoute.textContent = window.location.pathname;
    }
  </script>
</body>
</html>
