<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada | TreasuryHub</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: rgba(255,255,255,.78);
      --text: #101828;
      --muted: #667085;
      --accent: #0b2a3c;
      --accent2: #1d6f8f;
      --border: rgba(16, 24, 40, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29,111,143,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(11,42,60,.14), transparent 35%),
        linear-gradient(135deg, #f8fafc, #eef3f7);
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 42px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(16, 24, 40, .12);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(11,42,60,.08);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 12vw, 120px);
      line-height: .9;
      letter-spacing: -0.08em;
      color: var(--accent);
    }

    h2 {
      margin: 18px 0 10px;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: -0.04em;
    }

    p {
      max-width: 520px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      font-weight: 700;
      border-radius: 14px;
      padding: 13px 18px;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    a:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 28px rgba(11,42,60,.22);
    }

    .secondary {
      color: var(--accent);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.55);
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #98a2b3;
    }

    @media (max-width: 520px) {
      .card { padding: 30px 22px; }
      .actions { flex-direction: column; }
      a { width: 100%; }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="eyebrow">Error 404</div>

    <h1>404</h1>

    <h2>Página no encontrada</h2>

    <p>
      La página que buscas fue eliminada, cambió de dirección o todavía no está disponible.
      Puedes volver al inicio y seguir navegando.
    </p>

    <div class="actions">
      <a class="primary" href="/">Volver al inicio</a>
      <a class="secondary" href="javascript:history.back()">Regresar</a>
    </div>

    <div class="footer">
      TreasuryHub · Financial intelligence & insights
    </div>
  </main>
</body>
</html>
